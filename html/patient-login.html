<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicare+ | Patient Login</title>

<link rel="stylesheet" href="../css/patient-login.css">

<link 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
rel="stylesheet">


</head>


<body>



<div class="login-container">



    <!-- LEFT HEALTH SECTION -->


    <div class="health-section">


        <div class="logo">

            <i class="fa-solid fa-heart-pulse"></i>

            <h1>
                Medicare+
            </h1>

        </div>



        <h2>

            Your Health,
            Our Priority

        </h2>



        <p>

            Access your medical records,
            appointments and healthcare services
            anytime, anywhere.

        </p>





        <div class="health-features">


            <div>

                <i class="fa-solid fa-calendar-check"></i>

                <span>
                    Book Appointments
                </span>

            </div>



            <div>

                <i class="fa-solid fa-file-medical"></i>

                <span>
                    Digital Medical Records
                </span>

            </div>




            <div>

                <i class="fa-solid fa-user-doctor"></i>

                <span>
                    Connect With Doctors
                </span>

            </div>



        </div>



    </div>







    <!-- LOGIN BOX -->


    <div class="login-box">



        <div class="login-header">


            <i class="fa-solid fa-user"></i>


            <h2>

                Patient Login

            </h2>


            <p>

                Welcome back! Access your healthcare account.

            </p>


        </div>







        <form id="patientLoginForm">



            <div class="input-group">


                <i class="fa-solid fa-envelope"></i>


                <input 
                type="email"
                id="email"
                placeholder="Email Address"
                required>


            </div>







            <div class="input-group">


                <i class="fa-solid fa-lock"></i>


                <input 
                type="password"
                id="password"
                placeholder="Password"
                required>


                <i 
                class="fa-solid fa-eye"
                id="showPassword"></i>


            </div>







            <div class="options">


                <label>


                    <input type="checkbox">


                    Remember me


                </label>



                <a href="#">

                    Forgot Password?

                </a>


            </div>







            <button class="login-btn">


                Login


                <i class="fa-solid fa-arrow-right"></i>


            </button>






        </form>







        <div class="divider">


            <span>
                OR
            </span>


        </div>






        <button class="google-login">


            <i class="fa-brands fa-google"></i>


            Continue with Google


        </button>






<p class="register">

    New Patient?

    <a href="patient-register.html">

        Create Account

    </a>

</p>



    </div>




</div>



<script src="patient-login.js"></script>


</body>


</html>
